{% extends 'member/base.html' %}
{% load staticfiles %}

{% block current14 %}
    current
{% endblock %}

{% block body %}
    <div class="col-md-9">
        <div id="com-right" class="panel panel-default">
            <div class="panel-heading">
                <h3 class="panel-title">发布公告</h3>
            </div>
            <div class="panel-body">
                <br>
                <form action="/member/add_notices/" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <h4 class="inline-block">标题: </h4>
                    <input class="edit half-width" type="text" name="title">
                    <!--这里放富文本编辑器-->
                    {{ form.media }}
                    {{ form.as_p }}
                    <!--编辑器结束-->
                    <h4 class="inline-block">报名入口：</h4>
                    <select class="edit-select" name="com_id">
                        <option>无</option>
                        {% for com in com_list %}
                            <option value="{{ com.com_id }}">{{ com.com_name }}</option>
                        {% endfor %}
                    </select>
                    <br><br>
                    <span>作者: </span>
                    <input class="edit half-width" type="text" name="author" value="学科竞赛委员会"/>
                    <br><br>
                    <span>上传附件：</span><input type="file" name="com_attach"/>
                    <br><br>
                    <div class="text-center">
                        <button class="btn-custom" type="submit">发布</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
